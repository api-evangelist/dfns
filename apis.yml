aid: dfns
url: https://raw.githubusercontent.com/api-evangelist/dfns/refs/heads/main/apis.yml
name: Dfns
kind: company
description: Dfns is a wallet-as-a-service and MPC key-management infrastructure provider.
  Its API lets businesses create programmable, non-custodial wallets backed by
  multi-party-computation key shares, sign and broadcast transactions across many
  blockchains, and govern every action through a programmable policy engine with
  delegated signing, approvals, and User Action Signing.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Wallets
- MPC
- Key Management
- Digital Assets
- Web3
- Non-Custodial
created: '2026-07-01'
modified: '2026-07-01'
