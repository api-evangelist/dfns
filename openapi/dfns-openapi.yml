      description: >-
        Returns a current fee estimate (e.g. EIP-1559 maxFeePerGas /
        maxPriorityFeePerGas) for a given blockchain network.
      parameters:
        - in: query
          name: network
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The fee estimate for the network.
