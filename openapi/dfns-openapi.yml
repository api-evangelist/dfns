            application/json:
              schema:
                type: object
                properties:
                  network:
                    type: string
                  kind:
                    type: string
                  estimatedFees:
                    type: object
  /networks/{network}/call-function:
    post:
      operationId: callFunction
      tags: [Networks]
      summary: Read from a smart contract (call function)
